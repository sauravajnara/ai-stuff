spring.application.name=ragSearchEngine

# Groq (chat) - free tier
groq.api.key=${GROQ_API_KEY:GROQ_API_KEY}

# OpenAI chat disabled - using Groq instead
#langchain4j.open-ai.chat-model.api-key=
#langchain4j.open-ai.chat-model.model-name=gpt-4o-mini

# PostgreSQL / pgvector
spring.datasource.url=jdbc:postgresql://localhost:5433/ragdb
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0

# OpenTelemetry OTLP exporter (point to your collector in prod)
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Resilience4j & Circuit Breaker (llmCircuitBreaker)
resilience4j.circuitbreaker.instances.llmCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.llmCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.llmCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.llmCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.llmCircuitBreaker.register-health-indicator=true

# Resilience4j & Retry (llmRetry)
resilience4j.retry.instances.llmRetry.max-attempts=3
resilience4j.retry.instances.llmRetry.wait-duration=2s
resilience4j.retry.instances.llmRetry.enable-exponential-backoff=true
resilience4j.retry.instances.llmRetry.exponential-backoff-multiplier=2

# Expose circuit breaker health in actuator
management.health.circuitbreakers.enabled=true

# Redis — semantic cache layer 1 (exact match)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Semantic cache config
rag.cache.enabled=true
rag.cache.exact.ttl-minutes=60
rag.cache.semantic.similarity-threshold=0.95
rag.cache.semantic.ttl-days=7
