spring.application.name=ragSearchEngine

# Groq (chat) - free tier
groq.api.key=${GROQ_API_KEY:GROQ_API_KEY}

# OpenAI chat disabled - using Groq instead
#langchain4j.open-ai.chat-model.api-key=
#langchain4j.open-ai.chat-model.model-name=gpt-4o-mini

# PostgreSQL / pgvector
spring.datasource.url=jdbc:postgresql://localhost:5433/ragdb
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0

# OpenTelemetry OTLP exporter (point to your collector in prod)
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
